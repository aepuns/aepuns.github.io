<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>aepuns</title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <!-- =========================================
                    WEBSITE
    ========================================== -->

    <main id="website">

        <!-- =====================================
                    HOME STAGE
        ====================================== -->

        <section id="stage">

            <!-- CHARACTER -->

            <img
                id="character"
                src="images/apn-character.png"
                alt="Aepuns Character">

            <!-- LOGO -->

            <img
                id="logo"
                src="images/aepunslogo.png"
                alt="aepuns">

            <!-- ===============================
                    SPEECH BUBBLES
            ================================ -->

            <img
                id="updates"
                class="bubble"
                src="images/bubble1-updates.png"
                alt="Updates">

            <img
                id="point-updates"
                class="point"
                src="images/point1-updates.png"
                alt="">

            <img
                id="music"
                class="bubble"
                src="images/bubble2-music.png"
                alt="Music">

            <img
                id="point-music"
                class="point"
                src="images/point2-music.png"
                alt="">

            <img
                id="about"
                class="bubble"
                src="images/bubble3-about.png"
                alt="About the Puns">

            <img
                id="point-about"
                class="point"
                src="images/point3-about.png"
                alt="">

            <img
                id="wip"
                class="bubble"
                src="images/bubble4-wip.png"
                alt="Work in Progress">

            <img
                id="point-wip"
                class="point"
                src="images/point4-wip.png"
                alt="">

            <img
                id="socials"
                class="bubble"
                src="images/bubble5-socials.png"
                alt="Socials">

            <img
                id="point-socials"
                class="point"
                src="images/point5-socials.png"
                alt="">

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
