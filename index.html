<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>aepuns</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@1,400;1,700&display=swap">

    <script>
        try {
            if (sessionStorage.getItem("return-to-bubble")) {
                document.documentElement.classList.add("returning-from-bubble");
            }
            if (localStorage.getItem("disable-bubble-zoom") === "true") {
                document.documentElement.classList.add("disable-bubble-zoom");
            }
            if (localStorage.getItem("disable-background-motion") === "true") {
                document.documentElement.classList.add("disable-background-motion");
            }
        } catch (error) {}
    </script>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

    <button
        id="settings-button"
        type="button"
        aria-label="Open settings"
        aria-expanded="false"
        aria-controls="settings-panel">&#9881;&#xfe0e;</button>

    <aside id="settings-panel" aria-label="Settings" hidden>
        <h2>settings</h2>
        <label>
            <input id="disable-zoom" type="checkbox">
            disable zoom effect
        </label>
        <label>
            <input id="disable-background" type="checkbox">
            disable moving background
        </label>
    </aside>

    <!-- =========================================
                    WEBSITE
    ========================================== -->

    <main id="website">

        <!-- =====================================
                    HOME STAGE
        ====================================== -->

        <section id="stage">

            <!-- CHARACTER -->

            <img
                id="character"
                src="images/apn-character.png"
                alt="Aepuns Character">

            <!-- LOGO -->

            <img
                id="logo"
                src="images/aepunslogo.png"
                alt="aepuns">

            <!-- ===============================
                    SPEECH BUBBLES
            ================================ -->

            <img
                id="updates"
                class="bubble"
                src="images/bubble1-updates.png"
                alt="Updates">

            <img
                id="point-updates"
                class="point"
                src="images/point1-updates.png"
                alt="">

            <img
                id="music"
                class="bubble"
                src="images/bubble2-music.png"
                alt="Music">

            <img
                id="point-music"
                class="point"
                src="images/point2-music.png"
                alt="">

            <img
                id="about"
                class="bubble"
                src="images/bubble3-about.png"
                alt="About the Puns">

            <img
                id="point-about"
                class="point"
                src="images/point3-about.png"
                alt="">

            <img
                id="wip"
                class="bubble"
                src="images/bubble4-wip.png"
                alt="Work in Progress">

            <img
                id="point-wip"
                class="point"
                src="images/point4-wip.png"
                alt="">

            <img
                id="socials"
                class="bubble"
                src="images/bubble5-socials.png"
                alt="Socials">

            <img
                id="point-socials"
                class="point"
                src="images/point5-socials.png"
                alt="">

        </section>

    </main>

    <script src="js/script.js"></script>

</body>

</html>
